version: 2

models:
  - name: stg_aetna_members
    description: ""

    columns:
      - name: member_id
        data_type: varchar
        description: "Describes the member details"
        tests:
          - unique
          - not_null

      - name: gender
        data_type: varchar
        description: "Standardized gender codes"
        tests:
          - accepted_values:
              arguments:
                values: ['MALE', 'FEMALE','UNKNOWN']


  - name: stg_aetna_claims
    description: "Describes the aetna claims"

    columns:
      - name: claim_id
        data_type: varchar
        description: ""
        tests:
          - not_null
          - unique

      - name: member_id
        data_type: varchar
        description: ""
        tests:
          - not_null

      - name: provider_id
        data_type: varchar
        description: ""
        tests:
          - not_null
      
      - name: service_date
        tests:
          - not_null
             
      - name: claim_amount
        tests:
          - not_null

      - name: claim_status
        data_type: varchar
        description: ""
        tests:
          - accepted_values:
              arguments:
                values: ['PAID', 'DENIED', 'PENDING']

  
  - name: stg_aetna_eligibility
    description: ""
    columns:
      - name: member_id
        data_type: varchar
        description: ""
        tests:
        - not_null
        

      - name: plan_id
        data_type: varchar
        description: ""
        tests:
        - not_null


      - name: coverage_start
        data_type: date
        description: ""
        tests:
        - not_null

      - name: eligibility_status
        data_type: varchar
        description: ""
        tests:
          - accepted_values:
              arguments:
                values: ['ACTIVE','TERMINATED']

      - name: is_eligible
        data_type: boolean
        description: ""
        tests:
          - accepted_values:
              arguments:
                values: ['true', 'false']

        
             
       
          